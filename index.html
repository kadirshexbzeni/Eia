<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خشتەی کارکردن</title>
    <style>
        :root {
            --primary: #38bdf8;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --success: #22c55e;
            --danger: #ef4444;
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            text-align: center;
            padding: 5px 15px; /* کەمکردنەوەی پادینگی سەرەوە */
            margin: 0;
        }

        /* بچووککردنەوەی مەودای بانەرەکە */
        .icon-container {
            width: 80px;
            height: 62px;
            margin: 5px auto 10px auto; /* کەمکردنەوەی مەودای خوارەوەی وێنەکە */
            overflow: hidden;
        }
        
        .main-icon {
            width: 100%;
            height: 100%;
            object-fit: fill;
            display: block;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 12px; /* کەمکردنەوەی ناوپۆش */
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        input {
            width: 100%; padding: 10px; font-size: 1rem; margin-bottom: 10px;
            border-radius: 10px; border: 2px solid #334155; background: #0f172a;
            color: white; text-align: center; outline: none;
        }

        .res-date-top { 
            color: #ffffff; font-size: 1.1rem; font-weight: bold; 
            margin-bottom: 10px; display: block;
        }

        .all-groups-status { display: flex; flex-direction: column; gap: 8px; }

        .group-card {
            background: rgba(15, 23, 42, 0.7);
            padding: 10px 15px;
            border-radius: 15px;
            border: 1px solid #334155;
            cursor: pointer;
            position: relative;
        }

        .group-card.active-table { border-color: var(--primary); background: rgba(56, 189, 248, 0.1); }

        .on-duty-badge {
            background: var(--success);
            color: white;
            font-size: 0.65rem;
            padding: 1px 6px;
            border-radius: 8px;
            position: absolute;
            top: -6px;
            left: 10px;
            font-weight: bold;
        }

        .group-header { display: flex; justify-content: space-between; align-items: center; }
        .group-name { font-weight: bold; color: var(--primary); font-size: 0.9rem; }
        .shift-text { font-size: 0.85rem; font-weight: bold; direction: ltr; }

        .day { color: #fbbf24; }
        .evening { color: #22c55e; }
        .night { color: #38bdf8; }
        .off { color: var(--danger); }

        /* ڕێکخستنی خشتەکە بۆ ئەوەی بێتە سەرەوە */
        .table-container { margin-top: 15px; overflow-x: auto; border-radius: 12px; }
        table { width: 100%; border-collapse: collapse; background: var(--card-bg); font-size: 0.8rem; }
        th { background: #334155; color: var(--primary); padding: 8px 4px; }
        td { padding: 8px 4px; border-bottom: 1px solid #334155; }
        
        #tableTitle { margin-top: 15px; margin-bottom: 5px; font-size: 0.9rem; color: var(--primary); }

        .visitor-counter {
            margin-top: 20px;
            padding: 10px;
            font-size: 0.8rem;
            color: #94a3b8;
            border-top: 1px solid #334155;
        }
    </style>
</head>
<body>

    <div class="icon-container">
        <img src="https://raw.githubusercontent.com/kadirshexbzeni/schedule/refs/heads/main/IMG_4316.png" 
             alt="Logo" 
             class="main-icon">
    </div>

    <div class="container">
        <input type="date" id="date" onchange="updateAll()">
        <span id="res-date" class="res-date-top">--</span>
        <div class="all-groups-status" id="allGroups"></div>
    </div>

    <h3 id="tableTitle">خشتەی مانگانە</h3>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>ڕێکەوت</th>
                    <th>ڕۆژ</th>
                    <th>کاتژمێر</th>
                </tr>
            </thead>
            <tbody id="monthBody"></tbody>
        </table>
    </div>

    <div class="visitor-counter">
        👁️ سەردانیکەران: <span id="visit-count" style="color:var(--primary); font-weight:bold;">...</span>
    </div>

    <script>
        const rotation = [
            { A: "OFF 24", B: "07:00-03:00", C: "11:00-07:00", D: "03:00-11:00" },
            { A: "07:00-03:00", B: "OFF", C: "11:00-07:00", D: "03:00-11:00" },
            { A: "07:00-03:00", B: "03:00-11:00", C: "OFF 24", D: "11:00-07:00" },
            { A: "OFF", B: "03:00-11:00", C: "07:00-03:00", D: "11:00-07:00" },
            { A: "03:00-11:00", B: "11:00-07:00", C: "07:00-03:00", D: "OFF 24" },
            { A: "03:00-11:00", B: "11:00-07:00", C: "OFF", D: "07:00-03:00" },
            { A: "11:00-07:00", B: "OFF 24", C: "03:00-11:00", D: "07:00-03:00" },
            { A: "11:00-07:00", B: "07:00-03:00", C: "03:00-11:00", D: "OFF" }
        ];

        const kurdishDays = ["یەکشەممە", "دووشەممە", "سێشەممە", "چوارشەممە", "پێنجشەممە", "هەینی", "شەممە"];
        const baseDate = new Date("2026-03-14"); 

        function getShiftInfo(date, group) {
            let d = new Date(date); d.setHours(0,0,0,0);
            let s = new Date(baseDate); s.setHours(0,0,0,0);
            let diff = Math.floor((d - s) / (1000 * 60 * 60 * 24));
            let index = diff % 8; if (index < 0) index += 8;
            let raw = rotation[index][group];
            let color = "off", text = raw;
            if (raw === "07:00-03:00") { text = "07:00-03:00"; color = "day"; }
            else if (raw === "03:00-11:00") { text = "03:00-11:00"; color = "evening"; }
            else if (raw === "11:00-07:00") { text = "11:00-07:00"; color = "night"; }
            else if (raw === "OFF 24") { text = "پشوو 24"; color = "off"; }
            else if (raw === "OFF") { text = "پشوو"; color = "off"; }
            return { text, color, raw };
        }

        function isCurrentlyOnDuty(raw, selectedDate) {
            if (raw.includes("OFF")) return false;
            const now = new Date(), sel = new Date(selectedDate);
            if (now.toDateString() !== sel.toDateString()) return false;
            const hour = now.getHours();
            if (raw === "07:00-03:00" && hour >= 7 && hour < 15) return true;
            if (raw === "03:00-11:00" && hour >= 15 && hour < 23) return true;
            if (raw === "11:00-07:00" && (hour >= 23 || hour < 7)) return true;
            return false;
        }

        let currentGroup = "A";

        function updateAll() {
            const dateInput = document.getElementById("date");
            const selectedDate = new Date(dateInput.value);
            if (isNaN(selectedDate)) return;
            document.getElementById("res-date").innerText = kurdishDays[selectedDate.getDay()] + " " + selectedDate.toLocaleDateString('ku-IQ');
            const allGroupsDiv = document.getElementById("allGroups");
            allGroupsDiv.innerHTML = "";
            ["A", "B", "C", "D"].forEach(g => {
                let info = getShiftInfo(selectedDate, g);
                let onDuty = isCurrentlyOnDuty(info.raw, selectedDate);
                let activeClass = (g === currentGroup) ? "active-table" : "";
                allGroupsDiv.innerHTML += `<div class="group-card ${activeClass}" onclick="currentGroup='${g}'; updateAll();">
                        ${onDuty ? '<div class="on-duty-badge">ئێستا</div>' : ''}
                        <div class="group-header">
                            <span class="group-name">گرووپی ${g}</span>
                            <span class="shift-text ${info.color}">${info.text}</span>
                        </div>
                    </div>`;
            });
            updateTable(selectedDate);
        }

        function updateTable(selectedDate) {
            document.getElementById("tableTitle").innerText = `خشتەی (گرووپی ${currentGroup})`;
            const monthBody = document.getElementById("monthBody");
            monthBody.innerHTML = "";
            let year = selectedDate.getFullYear(), month = selectedDate.getMonth();
            let daysInMonth = new Date(year, month + 1, 0).getDate();
            let today = new Date(); today.setHours(0,0,0,0);
            for (let i = 1; i <= daysInMonth; i++) {
                let curDate = new Date(year, month, i);
                let info = getShiftInfo(curDate, currentGroup);
                let isToday = (curDate.getTime() === today.getTime()) ? "today-row" : "";
                monthBody.innerHTML += `<tr class="${isToday}">
                    <td>${i}-${month + 1}</td>
                    <td>${kurdishDays[curDate.getDay()]}</td>
                    <td class="${info.color}" style="direction:ltr; font-weight:bold;">${info.text}</td>
                </tr>`;
            }
        }

        function getVisitorCount() {
            let count = localStorage.getItem('unique_visits_kadir') || 0;
            count = parseInt(count) + 1;
            localStorage.setItem('unique_visits_kadir', count);
            document.getElementById('visit-count').innerText = count;
        }

        window.onload = () => {
            const today = new Date();
            const offset = today.getTimezoneOffset() * 60000;
            const localISODate = new Date(today.getTime() - offset).toISOString().split("T")[0];
            document.getElementById("date").value = localISODate;
            updateAll();
            getVisitorCount();
        };
    </script>
</body>
</html>
